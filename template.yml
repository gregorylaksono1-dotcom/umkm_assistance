AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Midtrans + billing + Telegram (Gemini translasi keterangan gambar/video) + WhatsApp verify.

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Timeout: 60
    MemorySize: 256
    Tracing: Active

Parameters:
  MidtransSecretArn:
    Type: String
    Default: arn:aws:secretsmanager:ap-southeast-1:084375570459:secret:midtrans_secret-gbnBcs
    Description: ARN Secrets Manager JSON (server_key/secret_key + client_key Midtrans).
  MidtransIsProduction:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: true = Midtrans production API; false = sandbox.
  TelegramBotToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: Token bot Telegram — balasan perintah (menu/credit/topup/…) + notifikasi Midtrans.
  WhatsAppVerifyToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: Token verifikasi Meta (hub.verify_token) untuk GET /webhook/whatsapp.
  UploadS3Bucket:
    Type: String
    Default: dapurartisan
    Description: Bucket S3 untuk menyimpan file gambar dari Telegram (harus sudah ada di akun).
  GeminiSecretArn:
    Type: String
    Default: arn:aws:secretsmanager:ap-southeast-1:084375570459:secret:gemini_llm-aoFcff
    Description: ARN Secrets Manager JSON untuk API key Gemini (translasi keterangan).
  GeminiSecretKeyName:
    Type: String
    Default: gemini_api_key
    Description: Nama field API key di JSON secret Gemini.
  ThirdPartyAiSecretArn:
    Type: String
    Default: arn:aws:secretsmanager:ap-southeast-1:084375570459:secret:thirdparty_ai-g3JOlp
    Description: Secret JSON berisi host (URL POST) dan api_key untuk API AI pihak ketiga.

Conditions:
  HasTelegramToken: !Not [!Equals [!Ref TelegramBotToken, ""]]

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default

  SenderMetaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sender_meta
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: senderId
          AttributeType: S
      KeySchema:
        - AttributeName: senderId
          KeyType: HASH

  BillingUsageCreditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: billing_usage_credit
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  RequestResourceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: request_resource
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chatId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: chatId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE

  WebhookFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: false
        Format: cjs
        EntryPoints:
          - src/webhook/index.js
    Properties:
      FunctionName: !Sub "${AWS::StackName}-webhook"
      Handler: index.handler
      CodeUri: .
      Timeout: 120
      MemorySize: 1024
      Environment:
        Variables:
          TABLE_SENDER_META: !Ref SenderMetaTable
          TABLE_BILLING_USAGE_CREDIT: !Ref BillingUsageCreditTable
          TABLE_REQUEST_RESOURCE: !Ref RequestResourceTable
          UPLOAD_S3_BUCKET: !Ref UploadS3Bucket
          MIDTRANS_SECRET_ARN: !Ref MidtransSecretArn
          MIDTRANS_IS_PRODUCTION: !Ref MidtransIsProduction
          GEMINI_SECRET_ARN: !Ref GeminiSecretArn
          GEMINI_SECRET_KEY_NAME: !Ref GeminiSecretKeyName
          THIRD_PARTY_AI_SECRET_ARN: !Ref ThirdPartyAiSecretArn
          WHATSAPP_VERIFY_TOKEN: !Ref WhatsAppVerifyToken
          TELEGRAM_BOT_TOKEN: !If [HasTelegramToken, !Ref TelegramBotToken, ""]
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:Query
                - dynamodb:UpdateItem
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt SenderMetaTable.Arn
                - !GetAtt BillingUsageCreditTable.Arn
                - !GetAtt RequestResourceTable.Arn
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${UploadS3Bucket}/*"
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref MidtransSecretArn
                - !Ref GeminiSecretArn
                - !Ref ThirdPartyAiSecretArn
      Events:
        Telegram:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /webhook/telegram
            Method: POST
        WhatsApp:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /webhook/whatsapp
            Method: POST
        WhatsAppVerify:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /webhook/whatsapp
            Method: GET
        MidtransPayment:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /webhook/midtrans
            Method: POST

Outputs:
  HttpApiUrl:
    Description: Base URL HTTP API
    Value: !GetAtt HttpApi.ApiEndpoint
  TelegramWebhookUrl:
    Description: setWebhook Telegram ke URL ini (POST updates)
    Value: !Join ["", [!GetAtt HttpApi.ApiEndpoint, "/webhook/telegram"]]
  WhatsAppWebhookUrl:
    Description: URL verifikasi / webhook WhatsApp Cloud API (POST tidak dipakai oleh stack ini kecuali Anda tambahkan handler)
    Value: !Join ["", [!GetAtt HttpApi.ApiEndpoint, "/webhook/whatsapp"]]
  MidtransNotificationUrl:
    Description: URL HTTP notification Midtrans (Payment Notification)
    Value: !Join ["", [!GetAtt HttpApi.ApiEndpoint, "/webhook/midtrans"]]
